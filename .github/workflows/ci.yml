name: Florent CI

on:
  push:
    branches: [ "feat/**", "develop" ]
    paths:
      - "backend/**"
  pull_request:
    branches: [ "develop", "main" ]
    paths:
      - "backend/**"

defaults:
  run:
    working-directory: backend

jobs:

  # ────────────────────────────────────────
  # 빌드 + 단위 테스트 (push / PR 모두)
  # ────────────────────────────────────────
  unit-test:
    name: 🧪 Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build & Test
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/build/reports/tests/test/

  # ────────────────────────────────────────
  # PR 테스트 결과 코멘트 (PR 시에만)
  # ────────────────────────────────────────
  pr-comment:
    name: 💬 PR Test Result Comment
    runs-on: ubuntu-latest
    needs: unit-test
    if: github.event_name == 'pull_request' && always()

    steps:
      - name: Post result comment
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.unit-test.result }}';
            const passed = result === 'success';
            const emoji  = passed ? '✅' : '❌';
            const title  = passed ? '테스트 통과 — 머지 가능' : '테스트 실패 — 수정 필요';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `## ${emoji} ${title}`,
                ``,
                `| 항목 | 결과 |`,
                `|---|---|`,
                `| 🧪 빌드 + 단위 테스트 | ${passed ? '✅ 통과' : '❌ 실패'} |`,
                ``,
                passed
                  ? `> 모든 검사를 통과했습니다.`
                  : `> 실패 원인: [Actions 로그 확인](${runUrl})`,
              ].join('\n')
            });
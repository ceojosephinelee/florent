services:
  db:
    image: postgres:15-alpine
    container_name: florent-db
    environment:
      POSTGRES_DB: florent
      POSTGRES_USER: florent
      POSTGRES_PASSWORD: florent
    ports:
      - "5432:5432"
    volumes:
      - florent-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U florent -d florent"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: florent-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/florent
      SPRING_DATASOURCE_USERNAME: florent
      SPRING_DATASOURCE_PASSWORD: florent
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  florent-db-data:
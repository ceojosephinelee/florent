services:
  postgres:
    image: postgres:16
    container_name: florent-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-florent}
      POSTGRES_USER: ${POSTGRES_USER:-florent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-florent}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-florent} -d ${POSTGRES_DB:-florent}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

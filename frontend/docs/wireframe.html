<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florent — MVP 와이어프레임</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --rose:      #C8614E;
  --rose-lt:   #F2E8E5;
  --rose-mid:  #E8C4BB;
  --sage:      #5A7A68;
  --sage-lt:   #E8F0EC;
  --sage-mid:  #B8CFC4;
  --cream:     #FAF7F4;
  --warm-w:    #FFFFFF;
  --ink:       #1C1917;
  --ink-60:    #6B6560;
  --ink-30:    #B8B4AF;
  --ink-10:    #F0EDE9;
  --border:    #E4E0DA;
  --page:      #F5F1EC;
  --shadow-sm: 0 1px 4px rgba(28,25,23,.07);
  --shadow-md: 0 4px 20px rgba(28,25,23,.10);
  --shadow-lg: 0 12px 48px rgba(28,25,23,.16);
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
  --phone-w: 375px;
}

body {
  background: var(--page);
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  overflow: hidden;
}

/* ══ TOP CHROME ══ */
.chrome {
  height: 52px;
  background: var(--warm-w);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
}
.chrome-logo {
  display: flex;
  flex-direction: column;
  line-height: 1;
  margin-right: 8px;
}
.chrome-logo-main {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--rose);
}
.chrome-logo-sub {
  font-size: 8px;
  font-weight: 300;
  letter-spacing: 0.2em;
  color: var(--ink-60);
  margin-top: 1px;
}
.app-switcher {
  display: flex;
  background: var(--ink-10);
  border-radius: 20px;
  padding: 3px;
  gap: 2px;
}
.sw-btn {
  padding: 5px 16px;
  border-radius: 17px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--ink-60);
  transition: all .2s;
  font-family: 'Noto Sans KR', sans-serif;
  white-space: nowrap;
}
.sw-btn.on-buyer  { background: var(--rose); color: #fff; }
.sw-btn.on-seller { background: var(--sage); color: #fff; }
.chrome-note {
  margin-left: auto;
  font-size: 11px;
  color: var(--ink-30);
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}

/* ══ LAYOUT ══ */
.layout {
  display: flex;
  height: calc(100vh - 52px);
  margin-top: 52px;
}

/* ══ SIDE NAV ══ */
.sidenav {
  width: 200px;
  background: var(--warm-w);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 12px 0 24px;
}
.nav-group { margin-bottom: 4px; }
.nav-group-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .14em;
  color: var(--ink-30);
  padding: 12px 16px 6px;
  text-transform: uppercase;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 16px;
  font-size: 12px;
  color: var(--ink-60);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all .15s;
}
.nav-item:hover { background: var(--ink-10); color: var(--ink); }
.nav-item.sel-b { border-left-color: var(--rose); background: var(--rose-lt); color: var(--rose); font-weight: 500; }
.nav-item.sel-s { border-left-color: var(--sage); background: var(--sage-lt); color: var(--sage); font-weight: 500; }
.nav-icon { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }

/* ══ CANVAS ══ */
.canvas {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 40px 80px;
  gap: 20px;
}

/* ══ PHONE ══ */
.phone-outer {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
}
.screen-title-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink-30);
  letter-spacing: .08em;
}
.phone {
  width: var(--phone-w);
  min-height: 780px;
  background: var(--warm-w);
  border-radius: 44px;
  box-shadow: var(--shadow-lg), 0 0 0 1px var(--border);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}
.phone-bar {
  height: 48px;
  background: var(--ink);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 10px;
  flex-shrink: 0;
}
.phone-pill { width: 110px; height: 5px; background: #333; border-radius: 3px; }
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 22px 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink);
  flex-shrink: 0;
}
.phone-body {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  scrollbar-width: none;
}
.phone-body::-webkit-scrollbar { display: none; }

/* ══ LOGO MARK ══ */
.logo-mark {
  display: flex;
  align-items: center;
  gap: 6px;
}
.logo-mark-icon {
  width: 28px; height: 28px;
  background: var(--rose);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.logo-mark-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}
.logo-mark-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: .04em;
  color: var(--ink);
}
.logo-mark-tagline {
  font-size: 8px;
  font-weight: 300;
  letter-spacing: .18em;
  color: var(--ink-60);
}

/* ══ IN-APP COMPONENTS ══ */
.app-nav {
  display: flex;
  align-items: center;
  padding: 10px 18px 8px;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.nav-back {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--ink-10);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  cursor: pointer;
  flex-shrink: 0;
}
.nav-title { font-size: 15px; font-weight: 700; flex: 1; }
.nav-action { font-size: 12px; font-weight: 500; color: var(--rose); }

/* step progress */
.step-bar {
  display: flex;
  align-items: center;
  padding: 14px 20px 10px;
  gap: 4px;
}
.step-dot {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.sd-done-b { background: var(--rose); color: #fff; }
.sd-done-s { background: var(--sage); color: #fff; }
.sd-active  { background: var(--ink); color: #fff; }
.sd-todo    { background: var(--border); color: var(--ink-60); }
.step-line { flex: 1; height: 2px; background: var(--border); }
.step-line-done-b { background: var(--rose); }
.step-line-done-s { background: var(--sage); }

/* section */
.sec { padding: 16px 18px 8px; }
.sec-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--ink-60);
  letter-spacing: .07em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.sec-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 4px;
}
.sec-sub {
  font-size: 12px;
  color: var(--ink-60);
  line-height: 1.5;
  margin-bottom: 14px;
}

/* field */
.field { margin-bottom: 16px; }
.field-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-60);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.req-dot { color: var(--rose); font-size: 14px; line-height: 1; }
.input-box {
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 11px 14px;
  font-size: 13px;
  color: var(--ink-30);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: 'Noto Sans KR', sans-serif;
}
.input-box.filled { color: var(--ink); border-color: var(--ink-30); }
.textarea-box {
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  font-size: 12px;
  color: var(--ink-30);
  min-height: 88px;
  line-height: 1.65;
  font-family: 'Noto Sans KR', sans-serif;
}
.textarea-box.filled { color: var(--ink-60); border-color: var(--ink-30); }

/* tags */
.tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 8px; }
.tag {
  padding: 6px 13px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  background: var(--cream);
  border: 1.5px solid var(--border);
  color: var(--ink-60);
  cursor: pointer;
  transition: all .15s;
}
.tag.on-b { background: var(--rose-lt); border-color: var(--rose); color: var(--rose); }
.tag.on-s { background: var(--sage-lt); border-color: var(--sage); color: var(--sage); }

/* toggle */
.toggle-row {
  display: flex;
  background: var(--ink-10);
  border-radius: var(--r-sm);
  padding: 3px;
  margin-bottom: 16px;
}
.toggle-btn {
  flex: 1;
  padding: 9px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  color: var(--ink-60);
  transition: all .15s;
}
.toggle-btn.on-b { background: var(--warm-w); color: var(--rose); font-weight: 700; box-shadow: var(--shadow-sm); }
.toggle-btn.on-s { background: var(--warm-w); color: var(--sage); font-weight: 700; box-shadow: var(--shadow-sm); }

/* budget grid */
.budget-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9px;
  margin-bottom: 12px;
}
.budget-card {
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px 12px;
  text-align: center;
  cursor: pointer;
  transition: all .15s;
}
.budget-card.on {
  background: var(--rose-lt);
  border-color: var(--rose);
}
.budget-emoji { font-size: 24px; margin-bottom: 6px; }
.budget-name { font-size: 12px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
.budget-price { font-size: 11px; color: var(--rose); font-weight: 600; margin-bottom: 3px; }
.budget-desc { font-size: 10px; color: var(--ink-60); line-height: 1.4; }

/* timeslot */
.slot-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 8px;
}
.slot {
  padding: 8px 3px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  font-size: 11px;
  text-align: center;
  cursor: pointer;
  color: var(--ink-60);
  background: var(--cream);
  transition: all .15s;
}
.slot.on { border-color: var(--rose); background: var(--rose-lt); color: var(--rose); font-weight: 600; }
.slot.on-s { border-color: var(--sage); background: var(--sage-lt); color: var(--sage); font-weight: 600; }

/* timeband */
.band-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.band {
  padding: 13px 4px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 11px;
  text-align: center;
  cursor: pointer;
  background: var(--cream);
  color: var(--ink-60);
}
.band-time { font-size: 10px; color: var(--ink-30); margin-top: 3px; }
.band.on { border-color: var(--rose); background: var(--rose-lt); color: var(--rose); font-weight: 600; }
.band.on .band-time { color: var(--rose); }

/* notice */
.notice {
  background: #FFF8EC;
  border: 1px solid #F0DDA0;
  border-radius: var(--r-sm);
  padding: 10px 13px;
  font-size: 11px;
  color: #7A6010;
  line-height: 1.55;
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
}
.notice-warn {
  background: #FEF0EE;
  border-color: #F0B8B0;
  color: #8A3020;
}
.notice-green {
  background: var(--sage-lt);
  border-color: var(--sage-mid);
  color: var(--sage);
}

/* divider */
.divider { height: 8px; background: var(--ink-10); flex-shrink: 0; }

/* bottom cta */
.bottom-cta {
  padding: 14px 18px 10px;
  background: var(--warm-w);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.btn {
  width: 100%;
  padding: 15px;
  border-radius: var(--r-sm);
  font-size: 14px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  text-align: center;
  font-family: 'Noto Sans KR', sans-serif;
  letter-spacing: -.01em;
}
.btn-buyer  { background: var(--rose); color: #fff; }
.btn-seller { background: var(--sage); color: #fff; }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--ink-60); }
.btn-ghost  { background: var(--ink-10); color: var(--ink-60); }

/* bottom nav */
.bnav {
  display: flex;
  border-top: 1px solid var(--border);
  padding: 8px 0 12px;
  background: var(--warm-w);
  flex-shrink: 0;
}
.bnav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 4px 0;
}
.bnav-icon { font-size: 21px; }
.bnav-label { font-size: 9px; color: var(--ink-30); font-weight: 500; }
.bnav-item.act-b .bnav-label { color: var(--rose); font-weight: 700; }
.bnav-item.act-s .bnav-label { color: var(--sage); font-weight: 700; }
.bnav-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  margin-top: -2px;
}
.bnav-dot-b { background: var(--rose); }
.bnav-dot-s { background: var(--sage); }

/* info row */
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  gap: 8px;
}
.info-row:last-child { border-bottom: none; }
.info-k { color: var(--ink-60); flex-shrink: 0; }
.info-v { font-weight: 600; text-align: right; }

/* badge */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}
.bd-new     { background: #FEF3C7; color: #92400E; }
.bd-arrived { background: var(--rose-lt); color: var(--rose); }
.bd-writing { background: #EDE9FE; color: #5B21B6; }
.bd-done    { background: var(--sage-lt); color: var(--sage); }
.bd-expire  { background: var(--rose-lt); color: var(--rose); }

/* proposal card */
.prop-card {
  margin: 0 18px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  background: var(--warm-w);
  box-shadow: var(--shadow-sm);
}
.prop-img {
  width: 100%;
  height: 130px;
  background: linear-gradient(135deg, #F2E8E5 0%, #E8D4CC 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  position: relative;
}
.prop-img-tag {
  position: absolute;
  bottom: 8px;
  right: 10px;
  font-size: 9px;
  background: rgba(255,255,255,.85);
  border-radius: 4px;
  padding: 2px 7px;
  color: var(--ink-60);
  backdrop-filter: blur(4px);
}
.prop-body { padding: 13px 14px; }
.prop-shop { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.prop-shop-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--rose-lt);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.prop-shop-name { font-size: 13px; font-weight: 700; }
.prop-shop-dist { font-size: 10px; color: var(--ink-60); }
.prop-curate {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
  line-height: 1.4;
}
.prop-desc {
  font-size: 11px;
  color: var(--ink-60);
  line-height: 1.65;
  margin-bottom: 10px;
}
.prop-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.prop-chip {
  font-size: 10px;
  padding: 4px 9px;
  border-radius: 5px;
  background: var(--ink-10);
  color: var(--ink-60);
}
.prop-expire {
  font-size: 10px;
  color: var(--rose);
  font-family: 'DM Mono', monospace;
  margin-bottom: 10px;
}
.prop-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}

/* map placeholder */
.map-ph {
  background: linear-gradient(135deg, #E8F0EC 0%, #D4E4DC 100%);
  border-radius: var(--r-sm);
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--sage);
  gap: 6px;
  margin-bottom: 12px;
  border: 1px solid var(--sage-mid);
}

/* writing pulse */
.writing-bar {
  margin: 0 18px 12px;
  background: #EDE9FE;
  border: 1px solid #C4B5FD;
  border-radius: var(--r-sm);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.pulse-dots { display: flex; gap: 4px; }
.pd {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #7C3AED;
  animation: pdBounce 1.1s infinite;
}
.pd:nth-child(2) { animation-delay: .18s; }
.pd:nth-child(3) { animation-delay: .36s; }
@keyframes pdBounce {
  0%,100% { transform: translateY(0); opacity: .5; }
  50% { transform: translateY(-4px); opacity: 1; }
}
.writing-txt { font-size: 12px; color: #5B21B6; font-weight: 500; }

/* list item */
.list-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .12s;
}
.list-item:hover { background: var(--cream); }
.list-thumb {
  width: 54px; height: 54px;
  border-radius: var(--r-sm);
  background: linear-gradient(135deg, #F2E8E5, #E8D4CC);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.list-thumb-s {
  background: linear-gradient(135deg, #E8F0EC, #D4E4DC);
}
.list-body { flex: 1; min-width: 0; }
.list-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.list-sub { font-size: 11px; color: var(--ink-60); line-height: 1.5; }
.list-right { flex-shrink: 0; text-align: right; }
.list-time { font-size: 10px; color: var(--ink-30); margin-top: 4px; }

/* stat card */
.stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px 10px;
  text-align: center;
}
.stat-num { font-size: 22px; font-weight: 700; margin-bottom: 3px; }
.stat-label { font-size: 10px; color: var(--ink-60); }

/* confirm hero */
.confirm-hero {
  padding: 36px 20px 20px;
  text-align: center;
  background: linear-gradient(180deg, var(--rose-lt) 0%, var(--warm-w) 100%);
}
.confirm-icon { font-size: 60px; margin-bottom: 12px; }
.confirm-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; margin-bottom: 6px; }
.confirm-sub { font-size: 12px; color: var(--ink-60); line-height: 1.6; }

/* photo upload */
.photo-row { display: flex; gap: 8px; margin-bottom: 12px; }
.photo-add {
  width: 72px; height: 72px;
  border: 2px dashed var(--border);
  border-radius: var(--r-sm);

}

/* request summary card */
.req-card {
  margin: 0 18px 10px;

  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  padding: 16px;

.req-card-top {

  gap: 10px;
  margin-bottom: 12px;

.req-emoji {

.req-meta { font-size: 11px; color: var(--ink-60); }
.req-timer { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--rose); }

/* template section */
.tmpl-block {
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 14px;
  margin-bottom: 10px;
}
.tmpl-q { font-size: 11px; font-weight: 700; color: var(--ink-60); margin-bottom: 6px; }
.tmpl-a { font-size: 12px; color: var(--ink); line-height: 1.6; }

/* scrollable slot container */
.slot-scroll { overflow-x: auto; padding-bottom: 4px; }

/* annotation */
.annot {
  background: #FFFBEA;
  border: 1px dashed #D4B860;
  border-radius: 7px;
  padding: 9px 13px;
  font-size: 11px;
  color: #7A5C10;
  line-height: 1.55;

}
.annot strong { color: #5A3C00; }

/* scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

// ══════════════════════════════════════
// STATE & RENDER
// ══════════════════════════════════════
let app = 'buyer';
let screen = 'b-home';

function switchApp(a, btn) {
  app = a;
  screen = a === 'buyer' ? 'b-home' : 's-home';
  document.querySelectorAll('.sw-btn').forEach(b => b.classList.remove('on-buyer','on-seller'));
  btn.classList.add(a === 'buyer' ? 'on-buyer' : 'on-seller');
  renderNav(); renderScreen();
}

function selectScreen(id) {
  screen = id;
  renderNav(); renderScreen();
  document.getElementById('canvas').scrollTop = 0;
}

function renderNav() {
  const nav = NAV[app];
  let html = '';
  nav.forEach(grp => {
    html += `<div class="nav-group"><div class="nav-group-label">${grp.group}</div>`;
    grp.items.forEach(it => {
      const active = it.id === screen;
      const cls = active ? (app === 'buyer' ? 'sel-b' : 'sel-s') : '';
      html += `<div class="nav-item ${cls}" onclick="selectScreen('${it.id}')">
        <span class="nav-icon">${it.icon}</span>${it.label}
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('sidenav').innerHTML = html;
}

function renderScreen() {
  const canvas = document.getElementById('canvas');
  const builder = SCREENS[screen];
  const tag = NAV[app].flatMap(g=>g.items).find(i=>i.id===screen)?.label || screen;
  if (builder) {
    canvas.innerHTML = builder();
  } else {
    canvas.innerHTML = `<div style="color:var(--ink-30);margin-top:60px;font-size:13px">준비 중인 화면이에요</div>`;
  }
}

renderNav(); renderScreen();
</script>

spring:
  application:
    name: florent
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 100
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

server:
  port: 8080

jwt:
  secret-key: ${JWT_SECRET_KEY:dev-secret-minimum-256-bits-long-key-for-local-development}
  access-token-validity-ms: 3600000
  refresh-token-validity-ms: 2592000000
